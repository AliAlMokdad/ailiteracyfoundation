<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG · Memo 02</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=JetBrains+Mono:wght@500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #F7F4EE;
    color: #15140F;
    font-family: 'Source Serif 4', Georgia, serif;
    position: relative;
  }
  .accent-top {
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: #B05433;
  }
  .glow {
    position: absolute; right: -200px; bottom: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(176,84,51,0.10) 0%, rgba(176,84,51,0) 70%);
    pointer-events: none;
  }
  .brand {
    position: absolute; top: 56px; left: 72px;
    display: flex; align-items: center; gap: 16px;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 20px; letter-spacing: 0.10em;
    color: #15140F; font-weight: 500;
  }
  .brand .dot {
    width: 14px; height: 14px; background: #B05433; border-radius: 50%;
    display: inline-block;
  }
  .eyebrow {
    position: absolute; top: 200px; left: 72px;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #B05433; font-weight: 500;
  }
  .title {
    position: absolute; top: 250px; left: 72px; right: 72px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 84px; font-weight: 500; line-height: 1.02;
    letter-spacing: -0.025em;
  }
  .subtitle {
    position: absolute; bottom: 140px; left: 72px; right: 72px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic; font-size: 30px; line-height: 1.35;
    color: #6b6862;
  }
  .footer {
    position: absolute; bottom: 56px; left: 72px; right: 72px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', 'Consolas', monospace;
    font-size: 19px; letter-spacing: 0.06em; color: #6b6862;
  }
  .footer .url { color: #15140F; font-weight: 500; }
</style>
</head>
<body>
  <div class="accent-top"></div>
  <div class="glow"></div>
  <div class="brand"><span class="dot"></span>AI LITERACY FOUNDATION</div>
  <div class="eyebrow">Memo 02 · Article 4</div>
  <div class="title">AI literacy is now<br>a legal duty.</div>
  <div class="subtitle">Article 4 of the EU AI Act, in plain language.</div>
  <div class="footer">
    <span>Copenhagen · Denmark</span>
    <span class="url">ailiteracyfoundation.eu</span>
  </div>
</body>
</html>
