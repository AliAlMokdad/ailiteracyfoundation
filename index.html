<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Literacy Foundation</title>
<meta name="description" content="AI Literacy Foundation. A Danish nonprofit in formation.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    background:#0a0a0a;color:#f5f5f3;
    display:flex;align-items:center;justify-content:center;
    padding:2rem;text-align:center;
    -webkit-font-smoothing:antialiased;
    animation:fadeIn 1.2s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .wrap{max-width:560px}
  .status{
    display:inline-flex;align-items:center;gap:.5rem;
    font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;
    color:#8a8a85;margin-bottom:3rem;
    padding:.4rem .8rem;border:1px solid #1f1f1f;border-radius:999px;
  }
  .dot{width:6px;height:6px;background:#fbbf24;border-radius:50%;
    box-shadow:0 0 8px rgba(251,191,36,.6);
    animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}
  h1{font-weight:500;font-size:clamp(1.5rem,5vw,2.5rem);
    letter-spacing:-.02em;margin-bottom:1.5rem;line-height:1.1}
  h1 .c{color:#fbbf24;animation:blink 1.2s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  p{color:#8a8a85;font-size:.95rem;line-height:1.6;max-width:420px;margin:0 auto}
  .small{margin-top:3rem;font-size:.7rem;letter-spacing:.1em;color:#555}
</style>
</head>
<body>
<div class="wrap">
  <div class="status"><span class="dot"></span>Under development</div>
  <h1>AI Literacy Foundation<span class="c">_</span></h1>
  <p>A Danish nonprofit in formation.<br>Foreningen AI Literacy Foundation. Building soon.</p>
  <div class="small">v0.1 · 2026 · Copenhagen, Denmark</div>
</div>
</body>
</html>
